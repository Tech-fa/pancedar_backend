pipelines:
  branches:
    main: # Or your desired branch
      - step:
          size: 2x
          name: Build and Push Docker Image
          image: amazon/aws-cli
          services:
            - docker
          caches:
            - docker
          script:
            - export AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
            - export AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
            - aws ecr get-login-password --region ca-central-1 | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.ca-central-1.amazonaws.com
            - docker build -t $AWS_ACCOUNT_ID.dkr.ecr.ca-central-1.amazonaws.com/vigelon:main  .
            - docker push $AWS_ACCOUNT_ID.dkr.ecr.ca-central-1.amazonaws.com/vigelon:main
definitions:
  services:
    docker:
      memory: 7128