
#
# Required repository secrets:
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#
# Required repository variables (Settings → Secrets and variables → Actions → Variables):
#   AWS_REGION                 e.g. us-east-1
#   ECR_REPOSITORY             ECR repository name only (not the full URI)
#
name: Deploy backend to ECR

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "./**"
      - ".github/workflows/deploy-backend-ecr.yml"

permissions:
  contents: read

concurrency:
  group: deploy-backend-ecr
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_URI="${REGISTRY}/${{ env.ECR_REPOSITORY }}"
          docker build -t "${IMAGE_URI}:${IMAGE_TAG}" .
          docker tag "${IMAGE_URI}:${IMAGE_TAG}" "${IMAGE_URI}:pancedar"
          docker push "${IMAGE_URI}:${IMAGE_TAG}"
          docker push "${IMAGE_URI}:pancedar"
